<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
</head>
<body>
    <form name="Registro" onsubmit="alert('enviado');">
        <label for="nome">Nome:</label> <input type="text" name="nome" id="nome">
        <br>

        <label for="idade">Idade:</label> <input type="number" name="idade" id="idade">
        <br>

        <label for="senha">Senha:</label> <input type="password" name="senha" id="senha">
        <br>

        <label for="range">Range:</label> <input type="range" name="range" id="range" min="0" max="100">
        <br>

        <label for="color">Cor:</label> <input type="color" name="color" id="color">
        <br>
        
        <label for="email">Email:</label> <input type="email" name="email" id="email">
        <br>

        <label for="date">Data:</label> <input type="date" name="date" id="date">
        <br>

        <label for="checkbox">checkbox</label> <input type="checkbox" name="checkbox" id="checkbox">
        <br>

        <label for="radio1">Radio 1</label> <input type="radio" name="radio" id="radio1">
        <label for="radio2">Radio 2</label> <input type="radio" name="radio" id="radio2">
        <br>

        <label for="hidden">hidden</label> <input type="hidden" name="hidden" id="hidden">
        <br>

        <label for="file">File</label> <input type="file" name="file" id="file">
        <br>

        <label for="search">Search</label> <input type="search" name="search" id="search">
        <br> <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
